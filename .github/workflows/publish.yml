name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. Publish the Rust crate to crates.io ──────────────────────────────────
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish prosemirror crate
        run: cargo publish -p prosemirror --token ${{ secrets.CRATES_IO_TOKEN }}

  # ── 2. Build Python wheels for all target platforms ─────────────────────────
  build-python-wheels:
    name: Build wheel · ${{ matrix.target }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up QEMU (for Linux aarch64 cross-compilation)
        if: runner.os == 'Linux' && matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: 'true'
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist

  # ── 3. Build the sdist (source distribution) ────────────────────────────────
  build-python-sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: python/dist

  # ── 4. Publish all wheels + sdist to PyPI ───────────────────────────────────
  publish-python:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-python-wheels, build-python-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/prosemirror-rs
    permissions:
      id-token: write   # required for PyPI trusted publishing (no API token needed)
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
