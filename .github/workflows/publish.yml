name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 1. Publish the Rust crate to crates.io ──────────────────────────────────
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish prosemirror crate
        run: cargo publish -p prosemirror
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ── 2. Build Python wheels for all target platforms ─────────────────────────
  build-python-wheels:
    name: Build wheel · ${{ matrix.target }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
            # No Python interpreter is available in the aarch64 manylinux
            # cross-compilation container, so we use the abi3 stable ABI.
            # pyo3/abi3-py38 supplies bundled C headers — no running Python needed.
            extra-args: --features pyo3/abi3-py38
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          target: ${{ matrix.target }}
          args: --release --out dist ${{ matrix.extra-args }}
          sccache: 'true'
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: python/dist

  # ── 3. Build the sdist (source distribution) ────────────────────────────────
  build-python-sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: python/dist

  # ── 4. Publish all wheels + sdist to PyPI ───────────────────────────────────
  publish-python:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-python-wheels, build-python-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/prosemirror-rs
    permissions:
      id-token: write   # required for PyPI trusted publishing (no API token needed)
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 5. Build Node.js binaries for all target platforms ──────────────────
  build-node-binaries:
    name: Build Node binary · ${{ matrix.target }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            triple: linux-x64-gnu
          - os: ubuntu-latest
            target: aarch64
            triple: linux-arm64-gnu
          - os: macos-latest
            target: x86_64
            triple: darwin-x64
          - os: macos-latest
            target: aarch64
            triple: darwin-arm64
          - os: windows-latest
            target: x86_64
            triple: win32-x64-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compilation dependencies (Linux aarch64)
        if: startsWith(matrix.os, 'ubuntu') && matrix.target == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build native addon
        working-directory: node
        run: cargo build --release
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target == 'aarch64' && 'aarch64-unknown-linux-gnu' || '' }}

      - name: Copy artifact
        working-directory: node
        run: node copy-artifact.mjs

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: node-binary-${{ matrix.triple }}
          path: node/prosemirror-rs.${{ matrix.triple }}.node

  # ── 6. Publish all Node binaries to npm ─────────────────────────────────
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/prosemirror-rs
    needs: [build-node-binaries]
    permissions:
      contents: read
      id-token: write   # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download all Node binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-binary-*
          merge-multiple: true
          path: node

      - name: List binaries
        working-directory: node
        run: ls -la prosemirror-rs.*.node

      - name: Publish to npm
        working-directory: node
        run: npm publish --provenance --access public
