name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: tests/spec/js/package-lock.json

      - name: Install JS dependencies
        working-directory: tests/spec/js
        run: npm install

      - name: Generate JS fixtures
        working-directory: tests/spec/js
        run: node generate_fixtures.mjs

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        run: cargo test --all

  test-python:
    name: Python Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and install wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          args: --release --out dist

      - name: Smoke-test the installed package
        run: |
          pip install prosemirror-rs --find-links python/dist --force-reinstall
          python - <<'EOF'
          from prosemirror_rs import Editor
          import json

          schema = json.dumps({
              "nodes": {
                  "doc":       {"content": "paragraph+"},
                  "paragraph": {"content": "text*", "group": "block"},
                  "text":      {"group": "inline"},
              },
              "marks": {"strong": {}, "em": {}},
          })
          doc = json.dumps({
              "type": "doc",
              "content": [{"type": "paragraph", "content": [{"type": "text", "text": "hello"}]}],
          })

          editor = Editor(schema, doc)
          assert editor.version == 0

          out = editor.doc_json()
          assert "hello" in out, f"Unexpected doc_json output: {out}"

          print("OK:", out)
          EOF

  test-python-free-threaded:
    name: Python Free-threaded (3.13t)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.13 free-threaded
        uses: actions/setup-python@v6
        with:
          python-version: '3.13t'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and install wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          args: --release --out dist

      - name: Install package
        run: pip install prosemirror-rs --find-links python/dist --force-reinstall

      - name: Verify GIL is disabled and run concurrency test
        run: |
          python - <<'EOF'
          import sys
          assert hasattr(sys, "_is_gil_enabled"), "Expected Python 3.12+"
          assert not sys._is_gil_enabled(), (
              f"GIL is unexpectedly enabled on {sys.version}. "
              "Ensure the free-threaded build is installed and that no "
              "imported extension re-enabled it."
          )
          print(f"GIL disabled confirmed on {sys.version}")
          EOF
          python python/tests/test_free_threaded.py
